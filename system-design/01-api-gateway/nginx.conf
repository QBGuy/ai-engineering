events {}

http {
    map $http_x_request_id $gateway_request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;

    upstream fastapi_gateway {
        least_conn;
        server gateway:8080;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 1m;

        location / {
            limit_req zone=api_per_ip burst=20 nodelay;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $gateway_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Required when the FastAPI gateway later proxies streamed model output.
            proxy_buffering off;

            add_header X-Request-ID $gateway_request_id always;
            proxy_pass http://fastapi_gateway;
        }
    }
}
