services:
  nginx:
    image: nginx:1.28-alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy

  gateway:
    build: .
    command: uvicorn app.gateway:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips="*"
    environment:
      API_KEY_TENANTS: dev-key:tenant-dev,team-key:tenant-team
      REDIS_URL: redis://redis:6379/0
      INFERENCE_URL: http://inference-service:8002/internal/chat
      REQUEST_CAPACITY: 5
      REQUEST_REFILL_PER_SECOND: 1
      TOKEN_CAPACITY: 100
      TOKEN_REFILL_PER_SECOND: 20
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      inference-service:
        condition: service_started

  inference-service:
    build: .
    command: uvicorn app.inference_service:app --host 0.0.0.0 --port 8002
    expose:
      - "8002"

  redis:
    image: redis:7.4-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
