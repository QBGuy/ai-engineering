events {}

http {
    limit_req_zone $binary_remote_addr zone=edge_per_ip:10m rate=20r/s;

    upstream rate_limiting_gateway {
        server gateway:8080;
        keepalive 16;
    }

    server {
        listen 8081;
        server_name _;

        location / {
            limit_req zone=edge_per_ip burst=20 nodelay;
            limit_req_status 429;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://rate_limiting_gateway;
        }
    }
}
